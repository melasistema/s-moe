<!DOCTYPE html>
<!--
  webchat.html — a dependency-free manual test console for serve_openai.py.

  Served at GET / by the OpenAI-compatible server, so it shares the server's
  origin: fetch() to /v1/chat/completions needs no CORS. It is a *test*
  client, deliberately thin — one file, vanilla JS, no build step — mirroring
  the ethos of chat.py and serve_openai.py. Any real OpenAI client (Open
  WebUI, LibreChat, the openai SDK) works identically against /v1.

  It resends the full message history every turn, exactly as OpenAI-style
  clients do — that is what lets the engine LCP-prefix-match and reuse its KV
  cache for a warm follow-up TTFT.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S-MoE · webchat</title>
<style>
    :root {
      /* Harmonized Deep Eggplant Base */
      --bg: #0b0914;
      --panel: #141122;
      --border: #2d2544;
      --fg: #f5f0ff;
      --muted: #8f87a3;

      /* Integrated Purple Palette */
      --accent: #c8abfa;       /* Color 01: Soft Lavender */
      --brand-mid: #a879e6;    /* Color 02: Focus & Hover */
      --brand-solid: #8e5cd9;  /* Color 03: Primary Button */

      /* Semantic / Chat Specific */
      --user: rgba(142, 92, 217, 0.12); /* Color 03 with soft opacity */
      --assist: #141122;                /* Matches panel background */
      --warn: #e3a018;                  /* Warm gold (complementary to purple) */
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg); color: var(--fg); display: flex; flex-direction: column;
      font: 15px/1.55 -apple-system, "SF Pro Text", Segoe UI, Roboto, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 12px; padding: 10px 16px;
      border-bottom: 1px solid var(--border); background: var(--panel);
    }
    header .title { font-weight: 600; letter-spacing: .2px; }
    header .title small { color: var(--muted); font-weight: 400; margin-left: 6px; }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: #3fb950; }
    header .dot.down { background: #f85149; }
    header .spacer { flex: 1; }
    header label { color: var(--muted); font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
    header input {
      width: 58px; background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; font: inherit; font-size: 12px;
      transition: border-color 0.15s ease;
    }
    header input:focus { outline: none; border-color: var(--brand-mid); }
    header button.ghost {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font: inherit; font-size: 12px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    header button.ghost:hover { color: var(--fg); border-color: var(--brand-mid); }
    /* Context-budget meter */
    header .ctx { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
    header .ctx-bar { width: 62px; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    header .ctx-bar i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s ease, background .3s ease; }
    header .ctx.warn .ctx-bar i { background: var(--warn); }
    header .ctx.warn .ctx-num { color: var(--warn); }
    header .ctx.full .ctx-bar i { background: #f85149; }
    header .ctx.full .ctx-num { color: #f85149; }
    header .ctx-num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-variant-numeric: tabular-nums; }
    /* System-RAM meter */
    header .ram { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; }
    header .ram-bar { width: 62px; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    header .ram-bar i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s ease, background .3s ease; }
    header .ram.warn .ram-bar i { background: var(--warn); }
    header .ram.warn .ram-num { color: var(--warn); }
    header .ram.crit .ram-bar i { background: #f85149; }
    header .ram.crit .ram-num { color: #f85149; }
    header .ram-num, header .ram-free { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-variant-numeric: tabular-nums; }
    header .ram-free { color: var(--muted); }
    /* Thin rule that groups the header */
    header .vsep { width: 1px; height: 20px; background: var(--border); }
    #log { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .wrap { max-width: 760px; margin: 0 auto; }
    .msg { padding: 12px 14px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--border); white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { background: var(--user); border-color: rgba(142, 92, 217, 0.25); }
    .msg.assistant { background: var(--assist); }
    .msg .role { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 6px; }
    .msg .fin { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .msg .fin.length { color: var(--warn); }
    .msg .stats {
      font-size: 11px; color: var(--muted); margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-variant-numeric: tabular-nums;
    }
    .msg .stats .hot { color: var(--accent); }
    /* Inline system notices */
    .notice { max-width: 760px; margin: 12px auto; text-align: center; font-size: 12px; color: var(--warn); line-height: 1.5; }
    .notice.full { color: #f85149; }
    .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    footer { border-top: 1px solid var(--border); background: var(--panel); padding: 12px 16px; }
    .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
    textarea {
      flex: 1; resize: none; background: var(--bg); color: var(--fg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font: inherit; max-height: 160px; min-height: 44px;
      transition: border-color 0.15s ease;
    }
    textarea:focus { outline: none; border-color: var(--brand-mid); }
    button.send {
      background: var(--brand-solid); color: #ffffff; border: none; border-radius: 10px;
      padding: 0 18px; height: 44px; font: inherit; font-weight: 600; cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }
    button.send:hover:not(:disabled) { background: var(--brand-mid); }
    button.send:disabled { opacity: .4; cursor: default; }
    .hint { text-align: center; color: var(--muted); font-size: 11px; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <span class="dot" id="dot" title="engine status"></span>
    <span class="title">S-MoE<small id="model" title="the model this engine is serving">…</small></span>
    <span class="spacer"></span>
    <span class="ram" id="ram" title="Mac physical memory — used / installed, and free headroom for S-MoE" hidden>
      <span class="ram-bar"><i id="ramfill"></i></span>
      <span class="ram-num" id="ramnum">— / —</span>
      <span class="ram-free" id="ramfree"></span>
    </span>
    <span class="vsep" id="ramsep" hidden></span>
    <span class="ctx" id="ctx" title="conversation tokens held in the engine's KV window (prompt + replies, cumulative)">
      <span class="ctx-bar"><i id="ctxfill"></i></span>
      <span class="ctx-num" id="ctxnum">0 / 4,096</span>
    </span>
    <span class="vsep"></span>
    <label>temp <input id="temp" type="number" step="0.1" min="0" value="0.6"></label>
    <label>max <input id="max" type="number" step="16" min="1" value="512"></label>
    <button class="ghost" id="reset">Reset</button>
  </header>

  <div id="log"><div class="wrap" id="wrap"></div></div>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="Ask something…  (Enter to send · Shift+Enter for newline)" rows="1"></textarea>
      <button class="send" id="send">Send</button>
    </div>
    <div class="hint">One serialized context · full history resent each turn for warm KV reuse · ~1 word/sec, NVMe-bound</div>
  </footer>

<script>
const messages = [];                    // the running OpenAI-style history
const wrap = document.getElementById("wrap");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
let busy = false;

// This page must be SERVED by serve_openai.py, not opened from disk: its
// fetches are relative, so on file:// they resolve to file:///v1/... and the
// browser blocks them. Fail loud and clear instead of silently.
if (location.protocol === "file:") {
  document.getElementById("dot").classList.add("down");
  wrap.innerHTML =
    '<div class="msg assistant"><div class="role">webchat</div><div class="body">'
    + "This console is open from a file:// URL, so it can’t reach the engine "
    + "(the browser blocks file:///v1/... requests).\n\nRun the server and open it "
    + "through that origin instead:\n\n    .venv/bin/python serve_openai.py --port 8000\n\n"
    + "then visit  http://127.0.0.1:8000/  in your browser."
    + "</div></div>";
  input.disabled = true; sendBtn.disabled = true;
  throw new Error("webchat.html must be served over http://, not opened from file://");
}

// ── model id + identity + liveness ─────────────────────────────────
// /v1/models carries the API id (what we send back in requests) plus two
// non-standard fields, `lineage` (the tokenizer checkpoint the vault was
// shattered from) and `quant` — the honest answer to "who am I talking to?".
// We show the lineage's short name + quant in the title; the full checkpoint
// path lives in the tooltip. Falls back to the bare id on older servers.
let modelId = "s-moe";                       // the value POSTed as `model`
const modelTag = document.getElementById("model");
fetch("/v1/models").then(r => r.json()).then(d => {
  const m = d?.data?.[0]; if (!m) return;
  if (m.id) modelId = m.id;
  if (m.lineage) {
    const shortName = m.lineage.split("/").pop();      // "Qwen/Qwen3-…" → "Qwen3-…"
    modelTag.textContent = shortName + (m.quant ? " · " + m.quant : "");
    modelTag.title = m.lineage + (m.quant ? " · " + m.quant + " (shattered vault)" : "");
  } else {
    modelTag.textContent = m.id || "s-moe";            // pre-lineage server
  }
}).catch(() => { modelTag.textContent = ""; });
async function poll() {
  try { const h = await (await fetch("/health")).json();
        document.getElementById("dot").classList.toggle("down", h.engine !== "up"); }
  catch { document.getElementById("dot").classList.add("down"); }
}
poll(); setInterval(poll, 5000);

// ── system RAM meter ───────────────────────────────────────────────
// The browser can't read host memory, so serve_openai.py exposes it at
// GET /sysmem (macOS vm_stat + hw.memsize). We surface installed total, used,
// and free headroom — the space S-MoE's expert-streaming ring can grow into.
// Colour follows macOS memory PRESSURE (the honest "fullness" signal — a 48 GB
// box streaming a 235B model legitimately runs high), falling back to raw %
// only when the pressure level is unavailable. Stays hidden off macOS.
const ramEl = document.getElementById("ram");
const ramFill = document.getElementById("ramfill");
const ramNum = document.getElementById("ramnum");
const ramFree = document.getElementById("ramfree");
const GB = 1 << 30;
const gb = b => (b / GB).toFixed(1);

async function pollRam() {
  let d; try { d = await (await fetch("/sysmem")).json(); } catch { return; }
  if (!d || !d.total) return;                 // non-macOS / unavailable → stay hidden
  ramEl.hidden = false;
  document.getElementById("ramsep").hidden = false;   // reveal its divider too
  ramFill.style.width = (Math.min(d.used / d.total, 1) * 100).toFixed(1) + "%";
  ramNum.textContent = gb(d.used) + " / " + gb(d.total) + " GB";
  ramFree.textContent = "· " + gb(d.available) + " free";
  const frac = d.used / d.total;
  const st = d.pressure === "critical" ? "crit"
           : d.pressure === "warning" ? "warn"
           : d.pressure ? "ok"                 // explicit "normal" — trust it over %
           : frac >= 0.96 ? "crit"             // no pressure signal → conservative %
           : frac >= 0.90 ? "warn" : "ok";
  ramEl.classList.toggle("warn", st === "warn");
  ramEl.classList.toggle("crit", st === "crit");
  // Tooltip carries the full breakdown, including S-MoE's own resident set.
  const parts = ["used " + gb(d.used) + " GB", "free " + gb(d.available) + " GB"];
  if (d.rss) parts.push("S-MoE RSS " + gb(d.rss) + " GB");
  if (d.wired) parts.push("wired " + gb(d.wired));
  if (d.compressed) parts.push("compressed " + gb(d.compressed));
  if (d.pressure) parts.push("pressure " + d.pressure);
  ramEl.title = "Mac memory — " + parts.join(" · ");
}
pollRam(); setInterval(pollRam, 2000);

// ── context-budget meter ───────────────────────────────────────────
// The engine holds ONE fixed KV window (ATTN_CTX in src/main.cpp — a 4096-slot
// ring). The whole conversation lives in it: chat-template overhead + every
// user turn + every reply, cumulatively. Past the wall the ring silently
// slides, dropping the OLDEST tokens — the model forgets the start with no
// error. This meter makes that budget visible, and warns once at the wall.
// Keep CTX_WINDOW in sync with ATTN_CTX if that constant ever changes.
const CTX_WINDOW = 4096;
const CTX_WARN = 0.85;                       // fraction that trips the amber warning
const ctxEl = document.getElementById("ctx");
const ctxFill = document.getElementById("ctxfill");
const ctxNum = document.getElementById("ctxnum");
let ctxWarned = "";                          // "" | "warn" | "full" — highest notice shown

const ctxState = used =>
  used >= CTX_WINDOW ? "full" : used >= CTX_WINDOW * CTX_WARN ? "warn" : "ok";

function renderCtx(used) {
  // The current turn's prompt_tokens is the full resent history, so it IS the
  // authoritative running total — no cross-turn accumulation needed.
  ctxFill.style.width = (Math.min(used / CTX_WINDOW, 1) * 100).toFixed(1) + "%";
  ctxNum.textContent = used.toLocaleString() + " / " + CTX_WINDOW.toLocaleString();
  const st = ctxState(used);
  ctxEl.classList.toggle("warn", st === "warn");
  ctxEl.classList.toggle("full", st === "full");
}

function noteCtx(used) {
  // Fire once per escalation (ok→warn→full), never per turn — a long
  // conversation is told exactly once that it's nearing, then past, the wall.
  const st = ctxState(used);
  if (st === "ok" || st === ctxWarned || (st === "warn" && ctxWarned === "full")) return;
  ctxWarned = st;
  if (st === "warn")
    addNotice("◦ context is " + Math.round(used / CTX_WINDOW * 100) + "% of the "
      + CTX_WINDOW.toLocaleString() + "-token window — a few more turns and the model "
      + "starts forgetting the beginning of this conversation. Reset to clear it.", "");
  else
    addNotice("● context window full — the engine is now sliding: the earliest turns "
      + "are dropping out of the model's memory. Reset for a clean slate.", "full");
}

function addNotice(text, kind) {
  const n = document.createElement("div");
  n.className = "notice" + (kind ? " " + kind : "");
  n.textContent = text;
  wrap.appendChild(n);
  document.getElementById("log").scrollTop = 1e9;
}

// ── rendering ──────────────────────────────────────────────────────
function addMsg(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.innerHTML = `<div class="role">${role}</div><div class="body"></div>`;
  el.querySelector(".body").textContent = text;
  wrap.appendChild(el);
  document.getElementById("log").scrollTop = 1e9;
  return el;
}
function setFin(el, reason) {
  const f = document.createElement("div");
  f.className = "fin" + (reason === "length" ? " length" : "");
  f.textContent = reason === "length"
    ? "◦ finish_reason: length — hit max_tokens (send again to continue)"
    : "◦ finish_reason: stop";
  el.appendChild(f);
}

// ── send / stream ──────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true; sendBtn.disabled = true; input.value = ""; input.style.height = "auto";

  messages.push({ role: "user", content: text });
  addMsg("user", text);

  const el = addMsg("assistant", "");
  const body = el.querySelector(".body");
  body.classList.add("cursor");
  let acc = "";

  // ── live turn monitor: wall-clock wait, TTFT, decode tok/s ─────────
  // TTFT here is the full client-side wait (queue + prefill + first token),
  // which is what a developer actually experiences at this console.
  const stats = document.createElement("div");
  stats.className = "stats";
  stats.textContent = "…";
  el.appendChild(stats);
  const t0 = performance.now();
  let tFirst = 0, ntok = 0, usage = null;
  const secs = ms => (ms / 1000).toFixed(1) + "s";
  // Decode rate = intervals between tokens (the first token ends prefill,
  // it doesn't count as decode work) — matches the engine's own tok/s.
  const rate = (n, ms) => n > 1 && ms > 0 ? ((n - 1) / (ms / 1000)).toFixed(2) : null;
  const tick = setInterval(() => {
    const now = performance.now();
    // Exact prompt size (full templated history, not just the typed text) —
    // the number the TTFT benchmarks are quoted against (e.g. 45-tok prompt).
    const p = usage && usage.prompt_tokens != null ? `${usage.prompt_tokens} tok prompt` : null;
    // Live context occupancy = this turn's prompt + tokens generated so far.
    if (usage && usage.prompt_tokens != null) renderCtx(usage.prompt_tokens + ntok);
    if (!tFirst) {
      stats.innerHTML = (p ? `prefilling ${p}` : "waiting for first token")
        + ` · <span class="hot">${secs(now - t0)}</span>`
        + (messages.length <= 1 ? " · cold start" : " · warm turn");
    } else {
      const r = rate(ntok, now - tFirst);
      stats.textContent = (p ? p + " · " : "") + `ttft ${secs(tFirst - t0)} · ${ntok} tok`
        + (r ? ` · ${r} tok/s` : "");
    }
  }, 100);

  try {
    const resp = await fetch("/v1/chat/completions", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: modelId,
        messages, stream: true,
        temperature: parseFloat(document.getElementById("temp").value),
        max_tokens: parseInt(document.getElementById("max").value, 10),
      }),
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let sse = "", finish = "stop", ended = false;
    while (!ended) {
      const { value, done } = await reader.read();
      if (done) break;
      sse += dec.decode(value, { stream: true });
      const lines = sse.split("\n"); sse = lines.pop();       // keep partial line
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        // [DONE] is the protocol-level terminator — end here instead of
        // waiting on the transport, so a keep-alive proxy can't leave us
        // spinning after the completion is over.
        if (data === "[DONE]") { ended = true; break; }
        let obj; try { obj = JSON.parse(data); } catch { continue; }
        // usage arrives twice: prompt_tokens alone on an early chunk (right
        // after tokenization, before prefill), full counts on the final one.
        if (obj.usage) {
          usage = Object.assign(usage || {}, obj.usage);
          // The prompt is the whole conversation resent — check the wall now,
          // before this reply even adds to it (catches an already-full prompt).
          if (usage.prompt_tokens != null) { renderCtx(usage.prompt_tokens + ntok); noteCtx(usage.prompt_tokens); }
        }
        const choice = obj.choices?.[0] || {};
        if (choice.delta?.content) { if (!tFirst) tFirst = performance.now();
                                     ntok++;
                                     acc += choice.delta.content; body.textContent = acc;
                                     document.getElementById("log").scrollTop = 1e9; }
        if (choice.finish_reason) finish = choice.finish_reason;
      }
    }
    if (ended) { try { reader.cancel(); } catch {} }          // release the socket
    body.classList.remove("cursor");

    // Freeze the monitor with exact numbers: the final chunk's usage counts
    // real tokens (client-side delta counting misses UTF-8 hold-back merges).
    const tEnd = performance.now();
    const toks = usage?.completion_tokens ?? ntok;
    const r = rate(toks, tEnd - tFirst);
    stats.textContent = tFirst
      ? (usage && usage.prompt_tokens != null ? `${usage.prompt_tokens} tok prompt · ` : "")
        + `ttft ${secs(tFirst - t0)} · ${toks} tok` + (r ? ` · ${r} tok/s` : "")
        + ` · ${secs(tEnd - t0)} total`
      : `no tokens · ${secs(tEnd - t0)} total`;

    // Freeze the meter on the exact turn total (prompt + real completion
    // count), and fire the wall warning once if this turn crossed it.
    const finalUsed = (usage?.prompt_tokens ?? 0) + (usage?.completion_tokens ?? ntok);
    renderCtx(finalUsed);
    noteCtx(finalUsed);

    messages.push({ role: "assistant", content: acc });
    setFin(el, finish);
  } catch (e) {
    body.classList.remove("cursor");
    stats.textContent = `failed after ${secs(performance.now() - t0)}`;
    body.textContent = acc + `\n[error: ${e}]`;
    messages.pop();   // drop the failed user turn so it can't poison context
  } finally {
    clearInterval(tick);
    busy = false; sendBtn.disabled = false; input.focus();
  }
}

// ── input UX ───────────────────────────────────────────────────────
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener("input", () => {
  input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px";
});
sendBtn.addEventListener("click", send);
document.getElementById("reset").addEventListener("click", () => {
  messages.length = 0; wrap.innerHTML = ""; input.focus();
  ctxWarned = ""; renderCtx(0);   // fresh conversation → empty context window
});
input.focus();
</script>
</body>
</html>
